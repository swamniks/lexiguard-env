spec_version: "1.0"
name: lexiguard
type: http
runtime: docker
app: server/app.py
port: 7860

tasks:
  - id: clause_identification
    difficulty: easy
    description: "Identify the clause type in a legal contract excerpt"
    grader:
      type: python
      path: env.grader:grade_clause_identification

  - id: risk_classification
    difficulty: medium
    description: "Classify the risk level of an indemnity clause"
    grader:
      type: python
      path: env.grader:grade_risk_classification

  - id: contract_negotiation
    difficulty: hard
    description: "Propose redlined revision to reduce supplier liability"
    grader:
      type: python
      path: env.grader:grade_contract_negotiation